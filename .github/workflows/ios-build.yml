name: "Build iOS App"

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Instalar XcodeGen y Generar Proyecto
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Compilar App
        run: |
          xcodebuild clean build -project DriveSight.xcodeproj \
          -scheme DriveSight \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
          CONFIGURATION_BUILD_DIR=build/Release-iphoneos

      - name: Empaquetar IPA
        run: |
          mkdir -p Payload
          mv build/Release-iphoneos/DriveSight.app Payload/
          zip -r DriveSight.ipa Payload

      - name: Subir IPA
        uses: actions/upload-artifact@v4
        with:
          name: DriveSight-App
          path: DriveSight.ipa
